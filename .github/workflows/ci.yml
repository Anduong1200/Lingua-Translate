name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install backend dependencies
        run: python -m pip install -r backend/requirements.txt

      - name: Install frontend dependencies
        run: npm ci

      - name: Run backend tests
        run: npm run test:backend

      - name: Check Alembic migrations on empty database
        run: |
          cd backend
          DATABASE_URL=sqlite:///data/ci_migration_check.sqlite3 alembic upgrade head

      - name: Build frontend
        run: npm run build
