name: CI

on:
  push:
    branches: [main, beta]
  pull_request:
    branches: [main, beta]

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install backend dependencies
        run: python -m pip install -r backend/requirements.txt

      - name: Install frontend dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Security check
        run: npm run security:check

      - name: Documentation asset check
        run: npm run docs:check

      - name: Run Alembic migrations on empty database
        run: |
          rm -f backend/data/ci_migration_check.sqlite3
          DATABASE_URL=sqlite:///backend/data/ci_migration_check.sqlite3 alembic upgrade head

      - name: Run backend tests
        run: npm run test:backend

      - name: Run frontend tests
        run: npm run test:frontend

      - name: Build frontend
        run: npm run build

      - name: Run E2E tests
        run: npm run e2e

      - name: Verify clean release artifact
        run: |
          npm run release:clean
          python - <<'PY'
          from pathlib import Path
          import zipfile
          artifact = Path("release/hanora-mvp-source.zip")
          assert artifact.exists(), "release artifact missing"
          with zipfile.ZipFile(artifact) as archive:
              names = archive.namelist()
              assert names, "release artifact is empty"
              assert all("\\" not in name for name in names), "zip contains Windows path separators"
              blocked = [
                  name
                  for name in names
                  if name.startswith((".git/", ".antigravitycli/", "node_modules/", "backend/data/", "dist/", "test-results/"))
                  or name.endswith(".env")
              ]
              assert not blocked, f"release contains blocked files: {blocked[:5]}"
          PY

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
