services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      APP_ENV: production
      FRONTEND_ORIGINS: http://127.0.0.1:3000,http://localhost:3000
      MAX_UPLOAD_BYTES: "52428800"
      UPLOAD_RATE_LIMIT_PER_MINUTE: "20"
      AI_RATE_LIMIT_PER_MINUTE: "30"
      GOOGLE_API_KEYS: ${GOOGLE_API_KEYS:-}
      GOOGLE_AI_MODEL: ${GOOGLE_AI_MODEL:-gemini-3.5-flash}
      GOOGLE_AI_TIMEOUT_SECONDS: ${GOOGLE_AI_TIMEOUT_SECONDS:-30}
      TESSERACT_CMD: tesseract
    ports:
      - "3001:3001"
    volumes:
      - ./backend/data:/app/backend/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:3001/api/health').read()"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        VITE_API_BASE_URL: http://127.0.0.1:3001/api
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "3000:80"
